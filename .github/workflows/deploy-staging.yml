name: Deploy to Staging (Hetzner)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Set up SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.STAGING_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          echo "${{ secrets.STAGING_SSH_KNOWN_HOSTS }}" > ~/.ssh/known_hosts

      - name: Deploy to server
        env:
          API_URL: https://salt.shadowedvaca.com/api
        run: |
          ssh -i ~/.ssh/deploy_key root@5.78.114.224 bash << 'ENDSSH'
            set -e
            cd /opt/satt-platform

            echo "=== Pulling latest code ==="
            git pull

            echo "=== Copying static files ==="
            cp *.html static/
            cp -r css/ js/ images/ static/

            echo "=== Injecting API URL ==="
            API_URL="https://salt.shadowedvaca.com/api"
            sed -i "s|__API_URL__|${API_URL}|g" \
              static/login.html \
              static/register.html \
              static/js/storage.js \
              static/js/site-config.js

            echo "=== Verifying ==="
            grep -r '__API_URL__' static/ && echo "ERROR: unreplaced placeholders!" && exit 1 || true
            grep "const API_URL" static/login.html

            echo "=== Done ==="
          ENDSSH
