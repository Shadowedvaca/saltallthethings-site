name: Deploy to Production (Hetzner)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Set up SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.STAGING_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          echo "${{ secrets.STAGING_SSH_KNOWN_HOSTS }}" > ~/.ssh/known_hosts

      - name: Deploy to server
        run: |
          ssh -i ~/.ssh/deploy_key root@5.78.114.224 bash << 'ENDSSH'
            set -e
            cd /opt/satt-platform

            echo "=== Pulling latest code ==="
            git pull

            echo "=== Copying static files ==="
            cp *.html static/
            cp -r css/ js/ images/ static/

            echo "=== Restarting backend ==="
            systemctl restart satt
            systemctl is-active satt

            echo "=== Done ==="
          ENDSSH
