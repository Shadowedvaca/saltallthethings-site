<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — Salt All The Things</title>
  <link rel="icon" type="image/jpeg" href="images/256x256.jpeg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <style>
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--bg-deep);
    }
    .login-card {
      background: var(--bg-card);
      border: 1px solid var(--border-default);
      border-radius: var(--radius-xl);
      padding: var(--space-2xl) var(--space-xl);
      max-width: 420px;
      width: 90%;
      text-align: center;
      box-shadow: var(--shadow-elevated);
    }
    .login-logo {
      width: 80px;
      border-radius: var(--radius-md);
      margin-bottom: var(--space-lg);
      filter: drop-shadow(0 0 20px rgba(200,168,78,0.2));
    }
    .login-title {
      font-family: 'Cinzel', serif;
      font-size: 1.4rem;
      color: var(--text-gold);
      margin-bottom: var(--space-xs);
    }
    .login-subtitle {
      color: var(--text-muted);
      font-size: 0.85rem;
      margin-bottom: var(--space-xl);
    }
    .login-form { text-align: left; }
    .login-footer {
      margin-top: var(--space-lg);
      font-size: 0.8rem;
      color: var(--text-muted);
    }
    .login-footer a { color: var(--gold-dim); text-decoration: none; }
    .login-footer a:hover { color: var(--gold); }
    .login-error {
      display: none;
      background: rgba(204,68,68,0.1);
      border: 1px solid var(--danger);
      border-radius: var(--radius-md);
      padding: var(--space-sm) var(--space-md);
      color: var(--danger);
      font-size: 0.85rem;
      margin-bottom: var(--space-md);
      text-align: center;
    }
  </style>
</head>
<body>

  <div class="login-card">
    <img src="images/256x256.jpeg" alt="SATT" class="login-logo">
    <h1 class="login-title">Salt All The Things</h1>
    <p class="login-subtitle">Crew Access</p>

    <form class="login-form" id="loginForm" onsubmit="handleLogin(event)">
      <div class="form-group">
        <label for="username">Username</label>
        <input type="text" id="username" autocomplete="username" placeholder="Enter your username" required>
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" autocomplete="current-password" placeholder="••••••••" required>
      </div>

      <div class="login-error" id="loginError">Invalid username or password</div>

      <button type="submit" class="btn btn-primary btn-lg" style="width: 100%;" id="submitBtn">Sign In</button>
    </form>

    <div class="login-footer">
      Need access? <a href="register.html">Register with an invite code →</a>
    </div>
  </div>

  <script>
    const API_URL = '__API_URL__';

    // If already logged in, redirect immediately
    (function() {
      var data = getSession();
      if (data) {
        var next = new URLSearchParams(location.search).get('next') || 'show_management.html';
        location.href = next;
      }
    })();

    function getSession() {
      try {
        var raw = localStorage.getItem('satt_jwt');
        if (!raw) return null;
        var data = JSON.parse(raw);
        if (!data.token) return null;
        // Decode JWT exp from payload (second segment, base64url)
        var parts = data.token.split('.');
        if (parts.length !== 3) return null;
        var payload = JSON.parse(atob(parts[1].replace(/-/g, '+').replace(/_/g, '/')));
        if (payload.exp && payload.exp * 1000 < Date.now()) {
          localStorage.removeItem('satt_jwt');
          return null;
        }
        return data;
      } catch(e) { return null; }
    }

    async function handleLogin(e) {
      e.preventDefault();
      var username = document.getElementById('username').value.trim();
      var password = document.getElementById('password').value;
      var errorEl = document.getElementById('loginError');
      var submitBtn = document.getElementById('submitBtn');

      errorEl.style.display = 'none';
      submitBtn.disabled = true;
      submitBtn.textContent = 'Signing in...';

      try {
        var resp = await fetch(API_URL + '/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username: username, password: password })
        });

        if (!resp.ok) {
          errorEl.style.display = 'block';
          submitBtn.disabled = false;
          submitBtn.textContent = 'Sign In';
          return;
        }

        var data = await resp.json();
        localStorage.setItem('satt_jwt', JSON.stringify({
          token: data.access_token,
          username: username,
          isAdmin: data.is_admin || false
        }));

        var next = new URLSearchParams(location.search).get('next') || 'show_management.html';
        location.href = next;

      } catch(err) {
        errorEl.textContent = 'Connection error — check your network';
        errorEl.style.display = 'block';
        submitBtn.disabled = false;
        submitBtn.textContent = 'Sign In';
      }
    }
  </script>
</body>
</html>
